<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة تسجيلات الفرق | War Zone</title>
  <style>
    :root{--bg:#07111f;--card:#101d33;--card2:#14233d;--line:#263955;--text:#f8fafc;--muted:#94a3b8;--cyan:#38bdf8;--blue:#0284c7;--green:#34d399;--red:#fb7185;--yellow:#f59e0b}
    *{box-sizing:border-box} body{margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(circle at top right,#12345c 0,#07111f 38%,#050b16 100%);color:var(--text);min-height:100vh;padding:20px}.wrap{max-width:1300px;margin:0 auto}.header{display:flex;justify-content:space-between;gap:14px;align-items:center;margin:10px 0 20px}.header h1{margin:0;color:var(--cyan)}.card{background:rgba(16,29,51,.9);border:1px solid rgba(148,163,184,.2);border-radius:22px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.24)}
    input,select{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#0b1628;color:var(--text)}button,a.btn{border:0;border-radius:12px;padding:11px 16px;color:white;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#0284c7,#0369a1);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}button.secondary,a.secondary{background:#1f2e46}button.danger{background:#be123c}button.green,a.green{background:linear-gradient(135deg,#059669,#047857)}button.yellow{background:#b45309}.actions{display:flex;gap:10px;flex-wrap:wrap}.login{max-width:460px;margin:90px auto}.login h1{text-align:center;color:var(--cyan)}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{background:#0b1628;border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center}.stat b{display:block;color:var(--cyan);font-size:1.5rem}.stat span{color:var(--muted);font-size:.85rem}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:13px;border-bottom:1px solid var(--line);text-align:right}th{background:#0b1628;color:var(--cyan)}tr:hover{background:rgba(56,189,248,.05)}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#0b1628;border:1px solid var(--line);color:var(--muted);font-size:.82rem}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:flex-start;justify-content:center;z-index:20;overflow:auto;padding:22px}.modal.show{display:flex}.modal-box{width:min(1180px,100%);margin:20px auto;background:#0b1628;border:1px solid var(--line);border-radius:22px;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.player{background:rgba(16,29,51,.85);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}.player h3{margin:0 0 12px;color:var(--yellow)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.filelinks{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.filelinks a{color:var(--cyan);font-size:.88rem}.status{display:none;margin:12px 0;border-radius:14px;padding:12px;font-weight:800;text-align:center}.success{display:block;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.35);color:var(--green)}.error{display:block;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.35);color:var(--red)}.muted{color:var(--muted)}
    @media(max-width:850px){body{padding:10px}.header,.toolbar{align-items:flex-start;flex-direction:column}.stats,.grid{grid-template-columns:1fr}.login{margin:30px auto}}
  </style>
</head>
<body>
<div class="wrap">
  <section id="loginBox" class="login card">
    <h1>🔐 إدارة تسجيلات War Zone</h1>
    <p class="muted" style="text-align:center">اكتب باسورد الأدمن لعرض التسجيلات.</p>
    <input id="password" type="password" placeholder="Password" />
    <button style="width:100%;margin-top:12px" onclick="login()">دخول</button>
    <div id="loginStatus" class="status"></div>
  </section>

  <section id="app" style="display:none">
    <div class="header">
      <div><h1>إدارة تسجيلات الفرق</h1><p class="muted">عرض، تعديل، حذف، وإخراج Excel.</p></div>
      <div class="actions"><a class="btn green" href="/register" target="_blank">+ تسجيل فريق جديد</a><a class="btn secondary" href="/whatsapp-groups">جروبات الواتساب</a><button class="yellow" onclick="exportExcel()">Export Excel</button><button class="secondary" onclick="logout()">خروج</button></div>
    </div>

    <div class="stats">
      <div class="stat"><b id="statTeams">0</b><span>فرق</span></div>
      <div class="stat"><b id="statPlayers">0</b><span>لاعبين</span></div>
      <div class="stat"><b id="statMales">0</b><span>ذكور</span></div>
      <div class="stat"><b id="statFemales">0</b><span>إناث</span></div>
    </div>

    <div class="card">
      <div class="toolbar"><input id="search" placeholder="ابحث باسم المنتخب..." oninput="renderTable()"><button onclick="loadTeams()">تحديث</button></div>
      <div class="table-wrap"><table><thead><tr><th>اسم المنتخب</th><th>عدد الأفراد</th><th>ذكور</th><th>إناث</th><th>جروب واتساب</th><th>آخر تعديل</th><th>تحكم</th></tr></thead><tbody id="teamsBody"></tbody></table></div>
      <div id="mainStatus" class="status"></div>
    </div>
  </section>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <div class="modal-head"><h2 id="modalTitle" style="margin:0;color:var(--cyan)">تعديل فريق</h2><button class="secondary" onclick="closeModal()">إغلاق</button></div>
    <div class="card" style="box-shadow:none">
      <label class="muted">اسم المنتخب</label>
      <input id="editTeamName" style="margin:8px 0 16px" />
      <div class="actions" style="margin-bottom:14px"><button onclick="addEditPlayer()">+ إضافة لاعب</button><button class="danger" onclick="removeEditLast()">- حذف آخر لاعب</button></div>
      <div id="editPlayers"></div>
      <div class="actions" style="justify-content:center"><button class="green" onclick="saveEdit()">حفظ التعديل ✅</button></div>
      <div id="editStatus" class="status"></div>
    </div>
  </div>
</div>

<script>
let PASS = localStorage.getItem('reg_admin_pass') || '';
let teams = [];
let currentTeam = null;
const digitMap = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9','۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
function normalizeDigits(value){return String(value || '').replace(/[٠-٩۰-۹]/g, d => digitMap[d] || d);}

function status(id,msg,ok){const el=document.getElementById(id);el.textContent=msg;el.className='status '+(ok?'success':'error');}
function headers(){return {'X-Admin-Password':PASS};}
async function api(url,opts={}){opts.headers={...(opts.headers||{}),...headers()};const res=await fetch(url,opts);let data={};try{data=await res.json()}catch(e){}if(!res.ok)throw new Error(data.detail||'حدث خطأ');return data;}
function login(){PASS=document.getElementById('password').value;localStorage.setItem('reg_admin_pass',PASS);loadTeams().then(()=>{document.getElementById('loginBox').style.display='none';document.getElementById('app').style.display='block';}).catch(e=>status('loginStatus',e.message,false));}
function logout(){localStorage.removeItem('reg_admin_pass');location.reload();}
async function loadTeams(){const data=await api('/api/registrations');teams=data.teams||[];renderTable();}
function renderTable(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const body=document.getElementById('teamsBody');
  let filtered=teams.filter(t=>(t.team_name||'').toLowerCase().includes(q));
  document.getElementById('statTeams').textContent=teams.length;
  document.getElementById('statPlayers').textContent=teams.reduce((a,t)=>a+(t.players_count||0),0);
  document.getElementById('statMales').textContent=teams.reduce((a,t)=>a+(t.males||0),0);
  document.getElementById('statFemales').textContent=teams.reduce((a,t)=>a+(t.females||0),0);
  body.innerHTML=filtered.map(t=>`<tr><td><b>${escapeHtml(t.team_name)}</b></td><td><span class="pill">${t.players_count}</span></td><td>${t.males}</td><td>${t.females}</td><td>${t.whatsapp_group?.link?`<a href="${escapeHtml(t.whatsapp_group.link)}" target="_blank" style="color:var(--green);font-weight:800">جروب ${t.whatsapp_group.slot}</a>`:'-'}</td><td>${formatDate(t.updated_at||t.created_at)}</td><td><div class="actions"><button onclick="openTeam('${t.id}')">عرض/تعديل</button><button class="danger" onclick="deleteTeam('${t.id}')">حذف</button></div></td></tr>`).join('') || '<tr><td colspan="7" class="muted">لا توجد تسجيلات</td></tr>';
}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function formatDate(s){if(!s)return '-';try{return new Date(s).toLocaleString('ar-EG')}catch(e){return s}}
async function openTeam(id){currentTeam=await api('/api/registrations/'+id);document.getElementById('editTeamName').value=currentTeam.team_name||'';renderEditPlayers();document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');currentTeam=null;}
function renderEditPlayers(){
  const el=document.getElementById('editPlayers');
  el.innerHTML=(currentTeam.players||[]).map((p,idx)=>editPlayerTemplate(p,idx)).join('');
}
function editPlayerTemplate(p,idx){
  const links=p.file_urls||{};
  const pass=encodeURIComponent(PASS);
  function link(kind,label){return links[kind]?`<a target="_blank" href="${links[kind]}?p=${pass}">${label}</a>`:''}
  return `<div class="player" data-idx="${idx}"><h3>لاعب رقم ${idx+1}</h3><div class="grid">
    <input placeholder="الاسم" data-k="name" value="${escapeHtml(p.name)}"><input placeholder="السن" type="text" inputmode="numeric" onblur="this.value=normalizeDigits(this.value)" data-k="age" value="${escapeHtml(p.age)}"><input type="date" data-k="birthdate" value="${escapeHtml(p.birthdate)}">
    <input placeholder="الرقم القومي" data-k="national_id" inputmode="numeric" maxlength="14" onblur="this.value=normalizeDigits(this.value)" value="${escapeHtml(p.national_id)}"><input placeholder="الجامعة" data-k="university" value="${escapeHtml(p.university)}"><input placeholder="الكلية" data-k="college" value="${escapeHtml(p.college)}">
    <select data-k="gender"><option value="ذكر" ${p.gender==='ذكر'?'selected':''}>ذكر</option><option value="أنثى" ${p.gender==='أنثى'?'selected':''}>أنثى</option></select>
  </div><div class="filelinks">${link('photo','الصورة الشخصية')}${link('id_card','صورة البطاقة')}${link('university_card','صورة الكارنيه')}</div>
  <div class="grid" style="margin-top:12px"><div><label class="muted">استبدال الصورة الشخصية</label><input type="file" data-file="photo" accept="image/png,image/jpeg,image/webp"></div><div><label class="muted">استبدال صورة البطاقة</label><input type="file" data-file="id_card" accept="image/png,image/jpeg,image/webp"></div><div><label class="muted">استبدال صورة الكارنيه</label><input type="file" data-file="university_card" accept="image/png,image/jpeg,image/webp"></div></div>
  <div style="margin-top:10px"><button class="danger" onclick="removeEditPlayer(${idx})">حذف اللاعب</button></div></div>`;
}
function addEditPlayer(){ if(!currentTeam)return; if(currentTeam.players.length>=15){status('editStatus','الفريق لا يزيد عن 15 فرد.',false);return;} currentTeam.players.push({id:null,client_key:'new_'+Date.now(),name:'',age:'',birthdate:'',national_id:'',university:'',college:'',gender:'ذكر',file_urls:{}}); renderEditPlayers(); }
function removeEditPlayer(idx){ if(currentTeam.players.length<=12){status('editStatus','الفريق لا يقل عن 12 فرد.',false);return;} currentTeam.players.splice(idx,1); renderEditPlayers(); }
function removeEditLast(){ if(!currentTeam)return; removeEditPlayer(currentTeam.players.length-1); }
async function saveEdit(){
  if(!currentTeam)return;
  const fd=new FormData(); fd.append('team_name',document.getElementById('editTeamName').value.trim());
  const players=[];
  [...document.querySelectorAll('#editPlayers .player')].forEach((card,idx)=>{
    const old=currentTeam.players[idx]||{};
    const key=old.id || old.client_key || ('new_'+idx);
    const p={id:old.id||null,client_key:key};
    card.querySelectorAll('[data-k]').forEach(inp=>p[inp.dataset.k]=inp.value.trim());
    p.age = normalizeDigits(p.age);
    p.national_id = normalizeDigits(p.national_id);
    p.birthdate = normalizeDigits(p.birthdate);
    card.querySelectorAll('[data-file]').forEach(inp=>{if(inp.files&&inp.files[0])fd.append(inp.dataset.file+'_'+key, inp.files[0]);});
    players.push(p);
  });
  fd.append('players_json',JSON.stringify(players));
  try{await api('/api/registrations/'+currentTeam.id,{method:'PUT',body:fd});status('editStatus','تم حفظ التعديل ✅',true);await loadTeams();setTimeout(closeModal,700);}catch(e){status('editStatus',e.message,false)}
}
async function deleteTeam(id){if(!confirm('متأكد من حذف الفريق وكل الصور؟'))return;try{await api('/api/registrations/'+id,{method:'DELETE'});await loadTeams();status('mainStatus','تم حذف الفريق',true)}catch(e){status('mainStatus',e.message,false)}}
function exportExcel(){window.location='/api/registrations/export?p='+encodeURIComponent(PASS)}
if(PASS){document.getElementById('password').value=PASS;login();}
</script>
</body>
</html>
